name: Deploy to AWS S3

on:
  push:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_SECRET_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Push to S3
        run: |
            # First sync non-JS/CSS files
            aws s3 sync ./dist s3://bucket-s3-aws-aws --delete --exclude "*.js" --exclude "*.css"

            # Then sync JS files with correct content type
            aws s3 sync ./dist s3://bucket-s3-aws-aws \
            --exclude "*" \
            --include "*.js" \
            --content-type "application/javascript"

            # Then sync CSS files with correct content type
                aws s3 sync ./dist s3://bucket-s3-aws-aws \
                --exclude "*" \
                --include "*.css" \
                --content-type "text/css"